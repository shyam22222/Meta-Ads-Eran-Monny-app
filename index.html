<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10741886' data-sdk='show_10741886'></script>

    <style>
        body { background: #050a15; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .page { display: none; }
        .active { display: block; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* WHEEL FIX - শতভাগ দৃশ্যমান করার জন্য */
        #wheel { 
            position: relative; width: 260px; height: 260px; border-radius: 50%; 
            border: 5px solid #3b82f6; margin: 20px auto; overflow: hidden;
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1);
            background: conic-gradient(
                #1e3a8a 0deg 30deg, #0f172a 30deg 60deg, #1e40af 60deg 90deg, 
                #020617 90deg 120deg, #2563eb 120deg 150deg, #1e293b 150deg 180deg, 
                #3b82f6 180deg 210deg, #0f172a 210deg 240deg, #60a5fa 240deg 270deg, 
                #1e3a8a 270deg 300deg, #ef4444 300deg 330deg, #1e40af 330deg 360deg
            );
        }
        .wheel-item {
            position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
        }

        .locked { opacity: 0.4; pointer-events: none; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #020617; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #1e293b; z-index: 100; }
        .nav-btn { color: #64748b; font-size: 10px; text-align: center; }
        .nav-btn.active-nav { color: #3b82f6; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <p id="tier" class="text-[10px] text-blue-400 font-bold uppercase">Standard Plan</p>
            <h1 id="bal-top" class="text-2xl font-black">$0.000</h1>
        </div>
        <div class="text-right">
            <button onclick="showPage('premium')" class="bg-blue-600 text-[10px] px-4 py-2 rounded-full font-bold">VIP UPGRADE</button>
        </div>
    </div>

    <div id="p-home" class="page active">
        <div class="card text-center bg-gradient-to-b from-blue-900/20 to-transparent">
            <p class="text-gray-400 text-[10px] uppercase font-bold mb-1">Total Earnings</p>
            <h2 id="bal-main" class="text-5xl font-black mb-6">$0.000</h2>
            <div class="flex gap-2">
                <button onclick="showPage('withdraw')" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Withdraw</button>
                <button onclick="showPage('history')" class="flex-1 bg-white/5 py-3 rounded-xl font-bold text-xs uppercase border border-white/10">History</button>
            </div>
        </div>

        <div class="card border-l-4 border-blue-500">
            <div class="flex justify-between mb-4">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Daily Video Ads</span>
                <span id="v-rem" class="text-[10px] text-blue-400 font-bold">15 Left</span>
            </div>
            <button id="main-ad-btn" onclick="startMainAd(this)" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase">Watch Ads ($0.05)</button>
        </div>

        <div class="card border-l-4 border-green-500">
            <p class="text-[10px] text-green-500 font-bold uppercase mb-4">Daily Signup Offer ($0.20)</p>
            <div class="flex gap-2">
                <button onclick="openSignup()" class="flex-1 bg-white/5 py-3 rounded-xl text-[10px] font-bold">OPEN LINK</button>
                <button id="verify-btn" onclick="verifySignup(this)" class="flex-1 bg-green-600 py-3 rounded-xl text-[10px] font-black uppercase">VERIFY (60S)</button>
            </div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <div class="flex bg-slate-900 p-1 rounded-xl mb-6">
            <button id="t-ads" onclick="renderJobs('ads')" class="flex-1 py-3 rounded-lg font-bold text-[10px] bg-blue-600">ADS VIEW</button>
            <button id="t-web" onclick="renderJobs('web')" class="flex-1 py-3 rounded-lg font-bold text-[10px]">WEB VIEW</button>
        </div>
        <div id="job-container" class="space-y-3"></div>
    </div>

    <div id="p-spin" class="page text-center">
        <div class="card">
            <h2 class="text-lg font-black text-blue-500 uppercase italic">Lucky Spin Wheel</h2>
            <p id="spin-msg" class="text-[9px] text-gray-500 uppercase mt-1">Spin to win up to $100</p>
            
            <div class="relative flex justify-center py-4">
                <div class="absolute top-0 text-blue-500 text-3xl z-10"><i class="fas fa-caret-down"></i></div>
                <div id="wheel"></div>
            </div>

            <button id="spin-btn" onclick="doSpin()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase">Start Spin</button>
        </div>
    </div>

    <div id="p-refer" class="page text-center">
        <div class="card">
            <i class="fas fa-link text-4xl text-blue-500 mb-4"></i>
            <h2 class="text-xl font-black uppercase">Referral Network</h2>
            <p class="text-[10px] text-gray-400 mt-2">Get $1.00 for every install + 25% Lifetime commission</p>
            <div id="ref-box" class="bg-black/40 p-4 rounded-xl text-[10px] text-blue-400 my-6 break-all border border-white/5">Generating...</div>
            <button onclick="copyRef()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs">COPY INVITE LINK</button>
        </div>
    </div>

    <div id="p-withdraw" class="page">
        <div class="card">
            <h3 class="text-center font-black text-red-500 mb-6 uppercase">Withdraw Fund</h3>
            <div class="space-y-4">
                <select id="w-gate" class="w-full bg-slate-900 p-4 rounded-xl text-xs font-bold border border-white/10 outline-none">
                    <option value="Bkash">Bkash (125 BDT/$)</option>
                    <option value="Nagad">Nagad (125 BDT/$)</option>
                    <option value="Binance">Binance Pay</option>
                </select>
                <input type="number" id="w-amt" placeholder="Min $10" class="w-full bg-white/5 p-4 rounded-xl text-sm font-bold border border-white/10 outline-none">
                <input type="text" id="w-info" placeholder="Phone Number / Wallet ID" class="w-full bg-white/5 p-4 rounded-xl text-sm font-bold border border-white/10 outline-none">
                <button onclick="handleWithdraw()" class="w-full bg-red-600 py-4 rounded-xl font-black text-xs uppercase">Submit Request</button>
            </div>
        </div>
    </div>

    <nav>
        <div onclick="showPage('home')" id="n-home" class="nav-btn active-nav"><i class="fas fa-home text-lg"></i><br>HOME</div>
        <div onclick="showPage('tasks')" id="n-tasks" class="nav-btn"><i class="fas fa-tasks text-lg"></i><br>TASKS</div>
        <div onclick="showPage('spin')" id="n-spin" class="nav-btn"><i class="fas fa-sync text-lg"></i><br>SPIN</div>
        <div onclick="showPage('refer')" id="n-refer" class="nav-btn"><i class="fas fa-user-plus text-lg"></i><br>REFER</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "USER_786";

        let uData = { balance: 0, mult: 1, dailyAds: 15, lastSignup: "", lastSpin: "", tasks: {}, history: [] };
        let isWaiting = false;

        const sLinks = [
            "https://omg10.com/4/10742061", "https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac",
            "https://omg10.com/4/10741957", "https://www.effectivegatecpm.com/e3icg0yc?key=34838b697cff95cb4259720733741245",
            "https://omg10.com/4/10742063", "https://www.effectivegatecpm.com/a771zn3ch?key=4f550e605f792b6e4926408dad579c46",
            "https://omg10.com/4/10742064", "https://www.effectivegatecpm.com/v4dctgq4ja?key=6a78657df2fb4f1f124b35f428ff4bc8",
            "https://omg10.com/4/10199976", "https://www.effectivegatecpm.com/s5dx27y4nj?key=af57e60d259aecb356babdf60afaec30",
            "https://omg10.com/4/10742065", "https://www.effectivegatecpm.com/qa90i6eu6?key=34662c4bfdcae6396c60cf711f35b6ed",
            "https://omg10.com/4/10741959", "https://www.effectivegatecpm.com/asfye22psb?key=a6036657fb671ad7244c668631e0aba6",
            "https://omg10.com/4/10742062"
        ];

        const rewards = ["$0.10", "$0.20", "$1", "$2", "$5", "$10", "$20", "$30", "$50", "$100", "TRY AGAIN", "$0.20"];

        // Sync Data
        db.ref('users/' + uid).on('value', snap => {
            if(snap.exists()) uData = snap.val();
            updateUI();
        });

        function updateUI() {
            const b = (uData.balance || 0).toFixed(3);
            document.getElementById('bal-top').innerText = "$" + b;
            document.getElementById('bal-main').innerText = "$" + b;
            document.getElementById('v-rem').innerText = (uData.dailyAds || 0) + " Left";
            document.getElementById('ref-box').innerText = `https://t.me/metaadsmonnybot?start=${uid}`;
            
            const today = new Date().toDateString();
            if(uData.lastSignup === today) {
                document.getElementById('verify-btn').className = "flex-1 bg-slate-800 text-gray-500 py-3 rounded-xl text-[10px] font-bold pointer-events-none";
                document.getElementById('verify-btn').innerText = "DONE TODAY";
            }
            if(uData.lastSpin === today) {
                document.getElementById('spin-btn').classList.add('locked');
                document.getElementById('spin-btn').innerText = "TRY AGAIN TO-DAY";
            }
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-nav'));
            document.getElementById('p-' + p).classList.add('active');
            document.getElementById('n-' + p).classList.add('active-nav');
            if(p === 'tasks') renderJobs('ads');
        }

        // --- MAIN AD FIX ---
        function startMainAd(btn) {
            if(uData.dailyAds <= 0 || isWaiting) return;
            isWaiting = true; btn.classList.add('locked');

            if(typeof show_10741886 === 'function') show_10741886();
            tg.openTelegramLink("https://t.me/metaadsmonnybot");

            let time = 30;
            const t = setInterval(() => {
                btn.innerText = `WAITING... ${time}S`;
                if(time-- <= 0) {
                    clearInterval(t);
                    saveEarn("Daily Video", 0.05, { dailyAds: uData.dailyAds - 1 });
                    tg.showAlert("Profit Added! $0.05");
                    isWaiting = false; btn.classList.remove('locked'); btn.innerText = "Watch Ads ($0.05)";
                }
            }, 1000);
        }

        // --- SIGNUP FIX ---
        function openSignup() {
            const idx = new Date().getDate() % 15;
            tg.openLink(sLinks[idx]);
        }

        function verifySignup(btn) {
            if(uData.lastSignup === new Date().toDateString() || isWaiting) return;
            isWaiting = true; btn.classList.add('locked');
            
            let time = 60;
            const t = setInterval(() => {
                btn.innerText = `VERIFYING... ${time}S`;
                if(time-- <= 0) {
                    clearInterval(t);
                    saveEarn("Daily Signup", 0.20, { lastSignup: new Date().toDateString() });
                    tg.showAlert("Signup Verified! $0.20 Earned.");
                    isWaiting = false;
                }
            }, 1000);
        }

        // --- SPIN WHEEL FIX ---
        function doSpin() {
            if(uData.lastSpin === new Date().toDateString() || isWaiting) return;
            isWaiting = true;
            const deg = 3600 + Math.floor(Math.random() * 3600);
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const winIdx = Math.floor(((360 - (deg % 360) + 15) % 360) / 30);
                const prize = rewards[winIdx];
                let amt = prize.includes('$') ? parseFloat(prize.replace('$','')) : 0;

                if(amt > 0) {
                    saveEarn("Spin Reward", amt, { lastSpin: new Date().toDateString() });
                    tg.showAlert(`You Won ${prize}!`);
                } else {
                    db.ref('users/' + uid).update({ lastSpin: new Date().toDateString() });
                    tg.showAlert("Try Tomorrow!");
                }
                isWaiting = false;
            }, 5000);
        }

        // --- TASKS SYSTEM ---
        function renderJobs(type) {
            const list = document.getElementById('job-container');
            list.innerHTML = "";
            const isAds = type === 'ads';
            
            document.getElementById('t-ads').className = isAds ? "flex-1 py-3 rounded-lg font-bold text-[10px] bg-blue-600" : "flex-1 py-3 rounded-lg font-bold text-[10px]";
            document.getElementById('t-web').className = !isAds ? "flex-1 py-3 rounded-lg font-bold text-[10px] bg-blue-600" : "flex-1 py-3 rounded-lg font-bold text-[10px]";

            for(let i=1; i<=15; i++) {
                const tid = `${type}_v${i}`;
                const done = uData.tasks && uData.tasks[tid];
                list.innerHTML += `<div class="card flex justify-between items-center">
                    <p class="text-[9px] font-bold uppercase">${isAds ? 'Ads View 30s Earn $0.05' : 'Web View 60s Earn $0.10'}</p>
                    <button onclick="runJob(this, ${isAds?0.05:0.10}, ${isAds?30:30}, '${tid}')" class="px-5 py-2 rounded-lg text-[9px] font-black ${done ? 'locked' : 'bg-blue-600'}">${done ? 'DONE' : 'START'}</button>
                </div>`;
            }
        }

        function runJob(btn, rew, sec, tid) {
            if(isWaiting || (uData.tasks && uData.tasks[tid])) return;
            isWaiting = true; btn.classList.add('locked');
            tg.openLink(sLinks[Math.floor(Math.random()*15)]);

            let r = sec;
            const t = setInterval(() => {
                btn.innerText = `${r}S`;
                if(r-- <= 0) {
                    clearInterval(t);
                    let upd = { balance: (uData.balance || 0) + rew };
                    if(!uData.tasks) uData.tasks = {};
                    uData.tasks[tid] = true;
                    upd.tasks = uData.tasks;
                    saveEarn("Task Complete", rew, upd);
                    tg.showAlert("Task Verified!");
                    isWaiting = false; btn.innerText = "DONE";
                }
            }, 1000);
        }

        // --- DATABASE SAVE FIX ---
        function saveEarn(title, amt, extras = {}) {
            const log = { title, amt, time: new Date().toLocaleString() };
            const history = [log, ...(uData.history || [])].slice(0, 15);
            db.ref('users/' + uid).update({
                balance: (uData.balance || 0) + (amt * (uData.mult || 1)),
                history: history,
                ...extras
            });
        }

        function handleWithdraw() {
            const a = parseFloat(document.getElementById('w-amt').value);
            const i = document.getElementById('w-info').value;
            if(a >= 10 && uData.balance >= a && i) {
                db.ref('withdrawals').push({ uid, amt: a, info: i, gate: document.getElementById('w-gate').value, status: 'Pending' });
                db.ref('users/' + uid).update({ balance: uData.balance - a });
                tg.showAlert("Success! Pending for Approval.");
            } else { tg.showAlert("Invalid Amount or Info!"); }
        }

        function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-box').innerText); tg.showAlert("Link Copied!"); }
    </script>
</body>
</html>
