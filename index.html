<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10741886' data-sdk='show_10741886'></script>

    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; }
        .balance-card { background: linear-gradient(135deg, #37b0ff 0%, #0076ff 100%); border-radius: 25px; box-shadow: 0 10px 30px rgba(0, 118, 255, 0.3); }
        .stats-card { background-color: #1c1c1e; border-radius: 20px; border: 1px solid #2c2c2e; }
        
        /* Spin Wheel Style */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ef4444 0deg 45deg, #f59e0b 45deg 90deg, #fcd34d 90deg 135deg, #10b981 135deg 180deg,
                #06b6d4 180deg 225deg, #3b82f6 225deg 270deg, #8b5cf6 270deg 315deg, #ec4899 315deg 360deg
            );
        }
        .segment-text { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #000; }
        .p1 { transform: rotate(22deg); } .p2 { transform: rotate(67deg); } .p3 { transform: rotate(112deg); } .p4 { transform: rotate(157deg); }
        .p5 { transform: rotate(202deg); } .p6 { transform: rotate(247deg); } .p7 { transform: rotate(292deg); } .p8 { transform: rotate(337deg); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 25px; height: 25px; background: white; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 20; }
        .locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body class="p-4 pb-24 text-center">

    <div class="flex items-center text-left mb-6">
        <div id="u-pic" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold text-white shadow-lg">?</div>
        <div>
            <h1 class="text-sm font-bold">Hello, <span id="u-name">User</span></h1>
            <p class="text-[9px] text-green-400 font-bold uppercase"><i class="fas fa-check-circle"></i> Verified Meta Earner</p>
        </div>
    </div>

    <div class="balance-card p-10 mb-8">
        <p class="text-xs font-bold opacity-80 uppercase tracking-widest">Available Balance</p>
        <h2 id="balance-text" class="text-5xl font-black mt-2 tracking-tighter">$0.000</h2>
    </div>

    <div class="mb-10">
        <div class="wheel-container">
            <div class="pointer"></div>
            <div id="wheel" class="relative overflow-hidden">
                <div class="segment-text p1"><b>$10</b></div> <div class="segment-text p2"><b>$5</b></div>
                <div class="segment-text p3"><b>$2</b></div>  <div class="segment-text p4"><b>$1</b></div>
                <div class="segment-text p5"><b>50¢</b></div> <div class="segment-text p6"><b>30¢</b></div>
                <div class="segment-text p7"><b>10¢</b></div> <div class="segment-text p8"><b>05¢</b></div>
            </div>
        </div>
        <button id="spin-btn" onclick="runSpin()" class="bg-blue-600 px-12 py-3 rounded-full font-bold mt-6 shadow-lg shadow-blue-500/40">SPIN NOW</button>
    </div>

    <div class="stats-card p-6 text-left">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-blue-400 font-bold text-[10px] uppercase tracking-widest">Rewarded Video Task</h3>
            <span class="text-[8px] bg-blue-900/40 text-blue-300 px-2 py-1 rounded border border-blue-800">5¢ REWARD</span>
        </div>
        <button id="ad-btn" onclick="showRandomAd()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white shadow-lg active:opacity-80">
            Watch Ad (30s) - $0.05
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "guest_user";
        const name = user ? user.first_name : "User";

        document.getElementById('u-name').innerText = name;
        document.getElementById('u-pic').innerText = name.charAt(0);

        let balance = 0;
        let lastSpin = 0;

        db.ref('users/' + userId).on('value', (s) => {
            const d = s.val();
            if (d) {
                balance = d.balance || 0;
                lastSpin = d.lastSpin || 0;
                document.getElementById('balance-text').innerText = "$" + balance.toFixed(3);
                const now = new Date().getTime();
                if (now - lastSpin < 86400000) {
                    const btn = document.getElementById('spin-btn');
                    btn.classList.add('locked');
                    btn.innerText = "Locked";
                }
            } else {
                db.ref('users/' + userId).set({ name: name, balance: 0, lastSpin: 0 });
            }
        });

        // আপনার দেওয়া সমস্ত অ্যাড লিঙ্ক
        const adLinks = [
            "https://omg10.com/4/10742061", "https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac",
            "https://omg10.com/4/10741957", "https://www.effectivegatecpm.com/e3icg0yc?key=34838b697cff95cb4259720733741245",
            "https://omg10.com/4/10742063", "https://www.effectivegatecpm.com/a771zn3ch?key=4f550e605f792b6e4926408dad579c46",
            "https://omg10.com/4/10742064", "https://www.effectivegatecpm.com/v4dctgq4ja?key=6a78657df2fb4f1f124b35f428ff4bc8",
            "https://omg10.com/4/10199976", "https://www.effectivegatecpm.com/s5dx27y4nj?key=af57e60d259aecb356babdf60afaec30",
            "https://omg10.com/4/10742065", "https://www.effectivegatecpm.com/qa90i6eu6?key=34662c4bfdcae6396c60cf711f35b6ed",
            "https://omg10.com/4/10741959", "https://www.effectivegatecpm.com/asfye22psb?key=a6036657fb671ad7244c668631e0aba6",
            "https://omg10.com/4/10742062"
        ];

        function showRandomAd() {
            const btn = document.getElementById('ad-btn');
            const randomLink = adLinks[Math.floor(Math.random() * adLinks.length)];
            
            // টেলিগ্রামের ভেতরে লিঙ্কটি ওপেন করার চেষ্টা
            tg.openLink(randomLink, {try_instant_view: true});
            
            btn.disabled = true;
            let time = 30;
            const timer = setInterval(() => {
                btn.innerText = `Verify Reward... ${time}s`;
                time--;
                if (time < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).update({ balance: balance + 0.05 });
                    btn.disabled = false;
                    btn.innerText = "Watch Ad (30s) - $0.05";
                    tg.showPopup({
                        title: 'Success!',
                        message: 'আপনি $0.05 রিওয়ার্ড পেয়েছেন।',
                        buttons: [{type: 'ok'}]
                    });
                }
            }, 1000);
        }

        function runSpin() {
            const now = new Date().getTime();
            if (now - lastSpin < 86400000) return;
            const wheel = document.getElementById('wheel');
            const rotate = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${rotate}deg)`;
            setTimeout(() => {
                const win = Math.random() < 0.1 ? 0.10 : 0.01;
                db.ref('users/' + userId).update({ balance: balance + win, lastSpin: now });
                tg.showAlert(`Congrats! Won $${win.toFixed(2)}`);
            }, 4100);
        }
    </script>
</body>
</html>
