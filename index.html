<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Monny Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        .balance-card { background: linear-gradient(180deg, #37b0ff 0%, #0076ff 100%); border-radius: 25px; box-shadow: 0 10px 20px rgba(0, 118, 255, 0.3); }
        .stats-card { background-color: #1c1c1e; border-radius: 20px; border: 1px solid #2c2c2e; }
        .btn-blue { background-color: #007aff; border-radius: 15px; color: #fff; width: 100%; padding: 15px; font-weight: bold; }
        .bottom-nav { background-color: #121212; border-top: 1px solid #2c2c2e; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6 mt-2">
        <div class="flex items-center">
            <div id="u-avatar" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold">U</div>
            <h1 class="font-bold text-sm"><span id="u-name">Loading...</span></h1>
        </div>
        <button onclick="openModal('leaderboard-modal')" class="bg-[#1c1c1e] p-2 rounded-lg border border-[#2c2c2e]">
            <i class="fas fa-trophy text-yellow-500"></i>
        </button>
    </div>

    <div class="balance-card p-10 text-center mb-6">
        <p class="text-sm opacity-90 uppercase tracking-widest">Total Balance</p>
        <h2 id="balance-text" class="text-5xl font-black mt-2">$0.000</h2>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <button onclick="dailyBonus()" class="stats-card p-4 flex flex-col items-center">
            <i class="fas fa-gift text-2xl text-pink-500 mb-2"></i>
            <span class="text-[10px] uppercase font-bold">Daily Bonus</span>
        </button>
        <button onclick="openModal('spin-modal')" class="stats-card p-4 flex flex-col items-center">
            <i class="fas fa-spinner text-2xl text-blue-400 mb-2"></i>
            <span class="text-[10px] uppercase font-bold">Lucky Spin</span>
        </button>
    </div>

    <div class="stats-card p-6 mb-6">
        <h3 class="font-bold mb-4 text-blue-400 text-sm"><i class="fas fa-tv mr-2"></i> WATCH ADS & EARN</h3>
        <button id="ad-btn" onclick="startAdTask()" class="btn-blue">Watch Ad (30s) - $0.01</button>
    </div>

    <div id="leaderboard-modal" class="modal">
        <h2 class="text-2xl font-bold mb-6 text-yellow-500 text-center">Top Earners</h2>
        <div id="leader-list" class="space-y-3"></div>
        <button onclick="closeModal('leaderboard-modal')" class="w-full text-gray-500 font-bold mt-8">Close</button>
    </div>

    <div id="spin-modal" class="modal">
        <h2 class="text-2xl font-bold mb-6 text-blue-400 text-center">Lucky Spin</h2>
        <div class="text-center p-10 bg-gray-900 rounded-full w-48 h-48 mx-auto flex items-center justify-center border-4 border-blue-500 mb-8">
            <i id="spin-icon" class="fas fa-sync-alt text-5xl"></i>
        </div>
        <button id="spin-btn" onclick="runSpin()" class="btn-blue">SPIN NOW ($0.001 - $0.005)</button>
        <button onclick="closeModal('spin-modal')" class="w-full text-gray-500 font-bold mt-8">Close</button>
    </div>

    <div class="bottom-nav">
        <div class="text-center text-white"><i class="fas fa-home block text-xl mb-1"></i>Home</div>
        <div onclick="inviteFriend()" class="text-center text-gray-500"><i class="fas fa-user-plus block text-xl mb-1"></i>Invite</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/", // আপনার Realtime Database লিঙ্কটি এখানে বসান
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "test_user";
        let userData = { balance: 0, ads: 0, lastBonus: 0 };

        // Data Sync
        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                userData = data;
                document.getElementById('balance-text').innerText = "$" + (data.balance || 0).toFixed(3);
                document.getElementById('u-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User";
            } else {
                db.ref('users/' + userId).set({ balance: 0, ads: 0, name: tg.initDataUnsafe.user.first_name, lastBonus: 0 });
            }
        });

        // Functions
        function dailyBonus() {
            let now = new Date().getTime();
            if (now - (userData.lastBonus || 0) < 86400000) return tg.showAlert("Already claimed today!");
            let bonus = 0.005;
            db.ref('users/' + userId).update({ balance: userData.balance + bonus, lastBonus: now });
            tg.showAlert("Daily Bonus $0.005 Added!");
        }

        function runSpin() {
            let btn = document.getElementById('spin-btn');
            btn.disabled = true;
            let win = (Math.random() * (0.005 - 0.001) + 0.001);
            setTimeout(() => {
                db.ref('users/' + userId).update({ balance: userData.balance + win });
                tg.showAlert(`You won $${win.toFixed(3)}!`);
                btn.disabled = false;
            }, 2000);
        }

        function startAdTask() {
            tg.openLink("https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac");
            let btn = document.getElementById('ad-btn');
            let time = 30; btn.disabled = true;
            let timer = setInterval(() => {
                btn.innerText = `Wait ${time}s...`; time--;
                if(time < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).update({ balance: userData.balance + 0.01, ads: (userData.ads || 0) + 1 });
                    btn.innerText = "Watch Ad (30s) - $0.01"; btn.disabled = false;
                    tg.showAlert("Reward Added!");
                }
            }, 1000);
        }

        function openModal(id) { 
            if(id === 'leaderboard-modal') loadLeaders();
            document.getElementById(id).style.display = 'block'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function loadLeaders() {
            db.ref('users').orderByChild('balance').limitToLast(10).once('value', (s) => {
                let html = "";
                s.forEach((u) => {
                    html = `<div class="stats-card p-4 flex justify-between"><span>${u.val().name}</span><span class="text-blue-400 font-bold">$${u.val().balance.toFixed(3)}</span></div>` + html;
                });
                document.getElementById('leader-list').innerHTML = html;
            });
        }

        function inviteFriend() {
            let link = `https://t.me/metaadsmonnybot?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join and earn together!`);
        }
    </script>
</body>
</html>
