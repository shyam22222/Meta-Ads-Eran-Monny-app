<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10741886' data-sdk='show_10741886'></script>

    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        .balance-card { background: linear-gradient(135deg, #37b0ff 0%, #0076ff 100%); border-radius: 20px; }
        .page-section { display: none; }
        .active-section { display: block; }
        .task-card { background-color: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 15px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="home-page" class="page-section active-section">
        <div class="flex items-center mb-6">
            <div id="u-pic" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold">?</div>
            <h1 class="text-sm font-bold">Hello, <span id="u-name">User</span></h1>
        </div>

        <div class="balance-card p-10 text-center mb-8">
            <p class="text-xs font-bold opacity-80 uppercase">Total Earnings</p>
            <h2 id="balance-text" class="text-5xl font-black mt-2 tracking-tighter">$0.000</h2>
        </div>

        <div class="bg-[#1c1c1e] p-6 rounded-2xl border border-blue-900/30 mb-6 text-center">
            <i class="fas fa-play-circle text-4xl text-blue-400 mb-3"></i>
            <h3 class="text-xs font-bold uppercase mb-4 tracking-widest">Main Video Task</h3>
            <button onclick="showMainAd()" id="main-ad-btn" class="w-full bg-blue-600 py-4 rounded-xl font-bold shadow-lg">Watch Ad - $0.05</button>
        </div>

        <button onclick="showPage('task-page')" class="w-full bg-[#1c1c1e] py-4 rounded-xl border border-gray-800 font-bold flex items-center justify-center">
            <i class="fas fa-tasks mr-3 text-pink-500"></i> Go to Daily Tasks (15 Ads)
        </button>
    </div>

    <div id="task-page" class="page-section">
        <div class="flex items-center mb-6">
            <button onclick="showPage('home-page')" class="mr-4 text-xl"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">Daily Tasks</h1>
        </div>
        
        <div id="task-list" class="space-y-3">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "test_user";
        const name = user ? user.first_name : "Guest";
        let currentBalance = 0;

        document.getElementById('u-name').innerText = name;
        document.getElementById('u-pic').innerText = name.charAt(0);

        // পেজ পরিবর্তন করার লজিক
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(pageId).classList.add('active-section');
        }

        // ব্যালেন্স আপডেট
        db.ref('users/' + userId).on('value', (s) => {
            if (s.val()) {
                currentBalance = s.val().balance || 0;
                document.getElementById('balance-text').innerText = "$" + currentBalance.toFixed(3);
            }
        });

        // ১. মেইন ভিডিও অ্যাড (টেলিগ্রামের ভেতরেই অ্যাড শো হবে)
        function showMainAd() {
            const btn = document.getElementById('main-ad-btn');
            if (typeof show_10741886 === 'function') {
                show_10741886().then(() => startTimer(btn, 0.05)).catch(() => tg.showAlert("Ad Error!"));
            } else {
                tg.showAlert("SDK Not Loaded!");
            }
        }

        // ২. ১৫টি স্মার্টলিঙ্কের তালিকা
        const tasks = Array.from({length: 15}, (_, i) => ({
            id: i + 1, name: `Smart Task ${i + 1}`, url: `YOUR_SMARTLINK_HERE_${i+1}`, reward: 0.05
        }));

        function loadTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = "task-card p-4 flex justify-between items-center";
                card.innerHTML = `
                    <div><p class="text-xs font-bold">${t.name}</p><p class="text-[9px] text-green-400">Reward: $${t.reward}</p></div>
                    <button id="tbtn-${t.id}" onclick="runSmartTask(${t.id},'${t.url}',${t.reward})" class="bg-blue-600 text-[10px] px-4 py-2 rounded-lg font-bold">START</button>
                `;
                list.appendChild(card);
            });
        }

        function runSmartTask(id, url, reward) {
            const btn = document.getElementById(`tbtn-${id}`);
            tg.openLink(url, { try_instant_view: true });
            startTimer(btn, reward);
        }

        function startTimer(btn, reward) {
            btn.disabled = true;
            let time = 30;
            const timer = setInterval(() => {
                btn.innerText = `Wait ${time}s`;
                time--;
                if (time < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).update({ balance: currentBalance + reward });
                    btn.innerText = "DONE";
                    btn.className = "bg-green-600 text-[10px] px-4 py-2 rounded-lg font-bold";
                    tg.showPopup({ title: 'Success!', message: `Earned $${reward}`, buttons: [{type: 'ok'}] });
                }
            }, 1000);
        }

        loadTasks();
    </script>
</body>
</html>
