<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // ড্যাশবোর্ডটি পুরো স্ক্রিন জুড়ে ওপেন হবে

    let balance = 0.300;
    let adsWatched = 6;

    function watchAd() {
        if (adsWatched < 15) {
            alert("বিজ্ঞাপন দেখছেন... ১০ সেকেন্ড অপেক্ষা করুন।");
            setTimeout(() => {
                balance += 0.010;
                adsWatched += 1;
                
                // স্ক্রিনে ব্যালেন্স আপডেট
                document.querySelector('.balance-card h2').innerText = "$" + balance.toFixed(3);
                document.querySelectorAll('.stats-card p.text-lg')[0].innerText = adsWatched;
                document.querySelectorAll('.stats-card p.text-lg')[1].innerText = adsWatched + " / 15";

                // বটের ডাটাবেজে তথ্য পাঠানোর জন্য (ভবিষ্যতের জন্য)
                tg.sendData(JSON.stringify({
                    "action": "ad_watched",
                    "new_balance": balance
                }));

                alert("অভিনন্দন! ১০ সেন্ট যোগ হয়েছে।");
            }, 10000);
        } else {
            alert("আজকের লিমিট শেষ!");
        }
    }

    document.querySelector('.task-btn').onclick = watchAd;
</script>
