<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; }
        .balance-card { background: linear-gradient(135deg, #37b0ff 0%, #0076ff 100%); border-radius: 25px; box-shadow: 0 10px 30px rgba(0, 118, 255, 0.4); }
        .stats-card { background-color: #1c1c1e; border-radius: 20px; border: 1px solid #2c2c2e; transition: all 0.2s; }
        .btn-blue { background-color: #007aff; border-radius: 15px; color: #fff; width: 100%; padding: 16px; font-weight: bold; font-size: 16px; transition: opacity 0.2s; }
        .btn-blue:disabled { background-color: #2c2c2e; color: #666; cursor: not-allowed; }
        .disabled-card { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex items-center mb-6 mt-2">
        <div id="user-photo" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold text-white shadow-lg">?</div>
        <div>
            <h1 class="text-md font-bold leading-tight">Hello, <span id="u-name">User</span></h1>
            <p class="text-[10px] text-green-400 font-bold"><i class="fas fa-check-circle"></i> VERIFIED EARNER</p>
        </div>
    </div>

    <div class="balance-card p-10 text-center mb-6">
        <p class="text-xs opacity-80 uppercase tracking-widest font-black">Total Earnings</p>
        <h2 id="balance-text" class="text-5xl font-black mt-2 tracking-tighter">$0.000</h2>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div id="daily-card" onclick="dailyBonus()" class="stats-card p-5 text-center cursor-pointer">
            <i class="fas fa-gift text-3xl text-pink-500 mb-2"></i>
            <p class="text-[11px] font-bold uppercase">Daily Bonus</p>
        </div>
        <div id="spin-card" onclick="runSpin()" class="stats-card p-5 text-center cursor-pointer">
            <i id="spin-icon" class="fas fa-dharmachakra text-3xl text-blue-400 mb-2"></i>
            <p class="text-[11px] font-bold uppercase">Lucky Spin</p>
        </div>
    </div>

    <div class="stats-card p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-blue-400 text-xs tracking-widest uppercase"><i class="fas fa-video mr-2"></i> Video Ad Task</h3>
            <span id="ad-status" class="text-[9px] bg-blue-900/50 text-blue-300 px-2 py-1 rounded border border-blue-800">READY</span>
        </div>
        <button id="ad-btn" onclick="startAdTask()" class="btn-blue">
            Watch Ad (30s) - $0.01
        </button>
        <p id="timer-msg" class="text-[10px] text-gray-500 mt-2 text-center hidden">অ্যাডটি সম্পূর্ণ না দেখলে রিওয়ার্ড পাবেন না!</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "test_user";
        const fullName = user ? (user.first_name + " " + (user.last_name || "")) : "Guest User";

        document.getElementById('u-name').innerText = fullName;
        document.getElementById('user-photo').innerText = fullName.charAt(0);

        let currentBalance = 0;
        let lastBonusDate = 0;
        let isSpinning = false;

        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentBalance = data.balance || 0;
                lastBonusDate = data.lastBonus || 0;
                document.getElementById('balance-text').innerText = "$" + currentBalance.toFixed(3);
            } else {
                db.ref('users/' + userId).set({ name: fullName, balance: 0, lastBonus: 0 });
            }
        });

        // ১. অ্যাড টাস্ক এবং ৩০ সেকেন্ড ভেরিফিকেশন লজিক
        function startAdTask() {
            const btn = document.getElementById('ad-btn');
            const status = document.getElementById('ad-status');
            const msg = document.getElementById('timer-msg');
            
            // অ্যাড লিঙ্ক ওপেন করা
            tg.openLink("https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac");
            
            btn.disabled = true;
            msg.classList.remove('hidden');
            status.innerText = "WATCHING...";
            status.classList.replace('text-blue-300', 'text-yellow-400');

            let timeLeft = 30;
            const timer = setInterval(() => {
                btn.innerText = `অপেক্ষা করুন: ${timeLeft}s`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timer);
                    // ৩০ সেকেন্ড শেষ হলেই কেবল ব্যালেন্স আপডেট হবে
                    const newBalance = currentBalance + 0.010;
                    db.ref('users/' + userId).update({ balance: newBalance });
                    
                    btn.innerText = "Watch Ad (30s) - $0.01";
                    btn.disabled = false;
                    msg.classList.add('hidden');
                    status.innerText = "SUCCESS";
                    status.classList.replace('text-yellow-400', 'text-green-400');
                    tg.showAlert("অভিনন্দন! আপনি $0.01 রিওয়ার্ড পেয়েছেন।");
                }
            }, 1000);
        }

        // ২. স্পিন লজিক (একবার ক্লিক করলে আর ক্লিক করা যাবে না যতক্ষণ না শেষ হয়)
        function runSpin() {
            if (isSpinning) return; // যদি অলরেডি চলতে থাকে তবে কাজ করবে না

            const icon = document.getElementById('spin-icon');
            const card = document.getElementById('spin-card');
            
            isSpinning = true;
            card.classList.add('disabled-card'); // বাটনটি দেখতে ডিজেবল লাগবে
            icon.classList.add('fa-spin');

            const winAmount = (Math.random() * (0.005 - 0.001) + 0.001);

            setTimeout(() => {
                const newBalance = currentBalance + winAmount;
                db.ref('users/' + userId).update({ balance: newBalance });
                
                icon.classList.remove('fa-spin');
                card.classList.remove('disabled-card');
                isSpinning = false; // আবার স্পিন করার সুযোগ দেওয়া হলো
                tg.showAlert(`আপনি জিতেছেন $${winAmount.toFixed(3)}!`);
            }, 3000); // ৩ সেকেন্ড ঘোরার পর রেজাল্ট আসবে
        }

        function dailyBonus() {
            const now = new Date().getTime();
            if (now - lastBonusDate < 86400000) {
                tg.showAlert("আজকের বোনাস নেওয়া হয়ে গেছে!");
                return;
            }
            db.ref('users/' + userId).update({ balance: currentBalance + 0.005, lastBonus: now });
            tg.showAlert("Daily Bonus $0.005 যোগ হয়েছে!");
        }
    </script>
</body>
</html>
