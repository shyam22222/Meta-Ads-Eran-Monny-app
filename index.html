<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10741886' data-sdk='show_10741886'></script>

    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .page-section { display: none; }
        .active-section { display: block; }
        .glass { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; }
        .grad-blue { background: linear-gradient(135deg, #0076ff 0%, #00d1ff 100%); }
    </style>
</head>
<body class="p-4 pb-24">

    <nav class="fixed bottom-0 left-0 right-0 glass h-16 flex justify-around items-center z-50 border-t border-white/10">
        <button onclick="showPage('home')" class="flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[10px]">Home</span></button>
        <button onclick="showPage('tasks')" class="flex flex-col items-center"><i class="fas fa-tasks"></i><span class="text-[10px]">Earning</span></button>
        <button onclick="showPage('premium')" class="flex flex-col items-center text-yellow-500"><i class="fas fa-crown"></i><span class="text-[10px]">Premium</span></button>
        <button onclick="showPage('refer')" class="flex flex-col items-center"><i class="fas fa-users"></i><span class="text-[10px]">Refer</span></button>
        <button onclick="showPage('withdraw')" class="flex flex-col items-center"><i class="fas fa-wallet"></i><span class="text-[10px]">Wallet</span></button>
    </nav>

    <div id="home" class="page-section active-section">
        <div class="glass p-6 text-center mb-6 grad-blue shadow-xl">
            <p class="text-[10px] uppercase font-bold opacity-80">Total Earnings</p>
            <h1 id="balance-text" class="text-4xl font-black mt-1">$0.000</h1>
            <p id="multiplier-tag" class="text-[9px] mt-2 font-black bg-white/20 inline-block px-3 py-1 rounded-full">LEVEL: 1X (NORMAL)</p>
        </div>

        <div class="glass p-5 mb-4 text-center border-blue-500/30">
            <h3 class="font-bold text-xs mb-1">Daily Video Task</h3>
            <p id="ad-limit-info" class="text-[9px] text-gray-400 mb-4">Limit: 15 Ads Left</p>
            <button onclick="showMainAd()" id="main-ad-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm">WATCH AD & CLAIM $0.05</button>
        </div>
    </div>

    <div id="tasks" class="page-section">
        <div class="flex gap-2 mb-6">
            <button onclick="toggleTaskType('smart')" id="smart-tab" class="flex-1 py-3 rounded-xl bg-blue-600 font-bold text-sm">Daily Smart</button>
            <button onclick="toggleTaskType('web')" id="web-tab" class="flex-1 py-3 rounded-xl glass font-bold text-sm">Web Task</button>
        </div>
        <div id="task-list" class="space-y-3">
            </div>
    </div>

    <div id="premium" class="page-section p-4">... Premium Logic ...</div>
    <div id="refer" class="page-section p-4">... Refer Logic ...</div>
    <div id="withdraw" class="page-section p-4">... Withdraw Logic ...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "test_user_123";

        let uData = { balance: 0, mult: 1, adCount: 0 };

        // Realtime Sync
        db.ref('users/' + userId).on('value', (s) => {
            const data = s.val();
            if(data) {
                uData = data;
                document.getElementById('balance-text').innerText = "$" + (data.balance || 0).toFixed(3);
                document.getElementById('multiplier-tag').innerText = `LEVEL: ${data.mult || 1}X`;
                document.getElementById('ad-limit-info').innerText = `Limit: ${15 - (data.adCount || 0)} Ads Left Today`;
            } else {
                db.ref('users/' + userId).set({ balance: 0, mult: 1, adCount: 0 });
            }
        });

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            if(id === 'tasks') toggleTaskType('smart');
        }

        // 🟢 TASK LIST GENERATOR (Fixed with Rewards)
        function toggleTaskType(type) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            const config = type === 'smart' 
                ? { count: 15, reward: 0.05, time: 30, name: 'Smart Click', link: 'https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac' } 
                : { count: 10, reward: 0.10, time: 60, name: 'Web View', link: 'https://google.com' };

            for (let i = 1; i <= config.count; i++) {
                const rewardWithMult = (config.reward * uData.mult).toFixed(2);
                const div = document.createElement('div');
                div.className = "glass p-4 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <p class="text-[11px] font-bold">${config.name} #${i}</p>
                        <p class="text-[9px] text-green-400 font-bold">Reward: $${rewardWithMult}</p>
                    </div>
                    <button onclick="handleTask(this, '${config.link}', ${config.reward}, ${config.time})" class="bg-blue-600 text-[10px] px-4 py-2 rounded-lg font-bold">START</button>
                `;
                list.appendChild(div);
            }
            
            // Tab Color Toggle
            document.getElementById('smart-tab').className = type === 'smart' ? "flex-1 py-3 rounded-xl bg-blue-600 font-bold text-sm" : "flex-1 py-3 rounded-xl glass font-bold text-sm";
            document.getElementById('web-tab').className = type === 'web' ? "flex-1 py-3 rounded-xl bg-blue-600 font-bold text-sm" : "flex-1 py-3 rounded-xl glass font-bold text-sm";
        }

        // 🟢 TASK HANDLER
        function handleTask(btn, url, reward, time) {
            tg.openLink(url);
            startVerification(btn, reward, time, 'task');
        }

        // 🟢 MAIN AD BUTTON
        function showMainAd() {
            if(uData.adCount >= 15) return tg.showAlert("লিমিট শেষ!");
            if (typeof show_10741886 === 'function') {
                show_10741886().then(() => {
                    startVerification(document.getElementById('main-ad-btn'), 0.05, 30, 'main');
                });
            }
        }

        // 🟢 VERIFICATION ENGINE (Fixed Reset)
        function startVerification(btn, reward, time, type) {
            btn.disabled = true;
            btn.style.opacity = "0.5";
            let timeLeft = time;
            const originalText = btn.innerText;

            const timer = setInterval(() => {
                btn.innerText = `Wait ${timeLeft}s`;
                timeLeft--;

                if(timeLeft < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).once('value').then(snap => {
                        const cur = snap.val() || { balance: 0, mult: 1, adCount: 0 };
                        const bonus = reward * (cur.mult || 1);
                        const updates = { balance: (cur.balance || 0) + bonus };
                        if(type === 'main') updates.adCount = (cur.adCount || 0) + 1;

                        db.ref('users/' + userId).update(updates).then(() => {
                            btn.innerText = "DONE";
                            btn.classList.replace('bg-blue-600', 'bg-green-600');
                            btn.style.opacity = "1";
                            if(type === 'main') {
                                setTimeout(() => {
                                    btn.disabled = false;
                                    btn.innerText = originalText;
                                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                                }, 2000);
                            }
                            tg.showAlert(`Success! $${bonus.toFixed(3)} added.`);
                        });
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
