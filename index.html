<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro - Official Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10741886' data-sdk='show_10741886'></script>

    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .page-section { display: none; }
        .active-section { display: block; }
        .glass { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; }
        .grad-blue { background: linear-gradient(135deg, #0076ff 0%, #00d1ff 100%); }
        .grad-gold { background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); color: #000; }
        .btn-locked { background-color: #374151 !important; cursor: not-allowed; opacity: 0.6; }
        .hidden-task { display: none !important; }
    </style>
</head>
<body class="p-4 pb-24">

    <nav class="fixed bottom-0 left-0 right-0 glass h-16 flex justify-around items-center z-50 border-t border-white/10">
        <button onclick="showPage('home')" class="flex flex-col items-center opacity-80 hover:opacity-100"><i class="fas fa-home"></i><span class="text-[10px]">Home</span></button>
        <button onclick="showPage('tasks')" class="flex flex-col items-center opacity-80 hover:opacity-100"><i class="fas fa-tasks"></i><span class="text-[10px]">Earning</span></button>
        <button onclick="showPage('premium')" class="flex flex-col items-center text-yellow-500"><i class="fas fa-crown"></i><span class="text-[10px]">Premium</span></button>
        <button onclick="showPage('refer')" class="flex flex-col items-center opacity-80 hover:opacity-100"><i class="fas fa-users"></i><span class="text-[10px]">Refer</span></button>
        <button onclick="showPage('withdraw')" class="flex flex-col items-center opacity-80 hover:opacity-100"><i class="fas fa-wallet"></i><span class="text-[10px]">Wallet</span></button>
    </nav>

    <div id="home" class="page-section active-section">
        <div class="glass p-6 text-center mb-6 grad-blue shadow-xl">
            <p class="text-[10px] uppercase font-bold opacity-80 tracking-widest">Total Earnings</p>
            <h1 id="balance-text" class="text-4xl font-black mt-1">$0.000</h1>
            <p id="multiplier-tag" class="text-[9px] mt-2 font-black bg-white/20 inline-block px-3 py-1 rounded-full">LEVEL: 1X (NORMAL)</p>
        </div>

        <div class="glass p-5 mb-4 text-center border-blue-500/30">
            <h3 class="font-bold text-xs mb-1">Daily Video Task</h3>
            <p id="ad-limit-info" class="text-[9px] text-gray-400 mb-4">Limit: 15 Ads Left</p>
            <button onclick="showMainAd()" id="main-ad-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-sm">WATCH AD & CLAIM $0.05</button>
        </div>

        <div id="signup-container" class="glass p-5 border-green-500/30">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xs uppercase">Sign-up Task</h3>
                <span class="bg-green-600 text-[9px] px-2 py-1 rounded font-bold">REWARD $0.20</span>
            </div>
            <button onclick="tg.openLink('YOUR_LINK')" class="w-full bg-white/5 py-3 rounded-xl border border-white/10 mb-2 text-xs font-bold">OPEN LINK</button>
            <button onclick="startVerification(this, 0.20, 60, 'signup')" id="signup-btn" class="w-full bg-green-600 py-3 rounded-xl text-xs font-bold">CONFIRM REGISTRATION (60S)</button>
        </div>
    </div>

    <div id="tasks" class="page-section">
        <div class="flex gap-2 mb-6">
            <button onclick="toggleTaskType('smart')" id="smart-tab" class="flex-1 py-3 rounded-xl bg-blue-600 font-bold text-sm">Daily Smart</button>
            <button onclick="toggleTaskType('web')" id="web-tab" class="flex-1 py-3 rounded-xl glass font-bold text-sm">Web Task</button>
        </div>
        <div id="task-list" class="space-y-3"></div>
    </div>

    <div id="premium" class="page-section">
        <h2 class="text-xl font-black mb-6 text-center text-yellow-500">Upgrade & Multiplier</h2>
        <div id="pay-box" class="hidden glass p-5 border-yellow-500/50 text-[10px]">
            <p>বিকাশ/নগদ: 01XXXXXXXXX</p>
            <button onclick="tg.openTelegramLink('https://t.me/meta_support')" class="w-full bg-blue-500 py-2 mt-2 rounded">SUPPORT</button>
        </div>
    </div>

    <div id="refer" class="page-section p-4">
        <div class="glass p-8 text-center">
            <div class="bg-black/40 p-3 rounded-lg text-[9px] mb-4 break-all" id="ref-url">Loading...</div>
            <button onclick="copyRef()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Copy Link</button>
        </div>
    </div>

    <div id="withdraw" class="page-section">
        <div class="glass p-6">
            <input id="w-addr" type="text" placeholder="Wallet Address" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 mb-4 text-xs">
            <input id="w-amount" type="number" placeholder="Amount ($)" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 mb-6 text-xs">
            <button onclick="submitWithdraw()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-sm">CONFIRM REQUEST</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "test_user_123";

        let uData = { balance: 0, mult: 1, adCount: 0, lastSignup: "" };

        // 🟢 REALTIME DATA SYNC
        db.ref('users/' + userId).on('value', (s) => {
            const data = s.val();
            if(data) {
                uData = data;
                document.getElementById('balance-text').innerText = "$" + (data.balance || 0).toFixed(3);
                document.getElementById('multiplier-tag').innerText = `LEVEL: ${data.mult || 1}X (${data.mult > 1 ? 'PREMIUM' : 'NORMAL'})`;
                document.getElementById('ad-limit-info').innerText = `Limit: ${15 - (data.adCount || 0)} Ads Left Today`;
                document.getElementById('ref-url').innerText = `https://t.me/metaadsmonnybot?start=${userId}`;

                // সাইন-আপ টাস্ক চেকার (আজকে করে থাকলে হাইড হবে)
                const today = new Date().toDateString();
                if(data.lastSignup === today) {
                    document.getElementById('signup-container').classList.add('hidden-task');
                }
            } else {
                db.ref('users/' + userId).set({ balance: 0, mult: 1, adCount: 0, name: user ? user.first_name : "User", lastSignup: "" });
            }
        });

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        // 🟢 MAIN AD LOGIC (FIXED FOR 15 TIMES)
        function showMainAd() {
            if((uData.adCount || 0) >= 15) return tg.showAlert("আজকের ১৫টি অ্যাড লিমিট শেষ!");
            
            if (typeof show_10741886 === 'function') {
                show_10741886().then(() => {
                    startVerification(document.getElementById('main-ad-btn'), 0.05, 30, 'main');
                }).catch(() => tg.showAlert("Ad error! Please try again."));
            } else {
                tg.showAlert("SDK loading...");
            }
        }

        // 🟢 VERIFICATION & REWARD LOGIC (FIXED)
        function startVerification(btn, reward, time, type) {
            btn.disabled = true;
            btn.classList.add('btn-locked');
            const originalText = btn.innerText;
            
            let timeLeft = time;
            const timer = setInterval(() => {
                btn.innerText = `Wait ${timeLeft}s`;
                timeLeft--;

                if(timeLeft < 0) {
                    clearInterval(timer);
                    
                    db.ref('users/' + userId).once('value').then(snap => {
                        const cur = snap.val() || { balance: 0, mult: 1, adCount: 0 };
                        const bonus = reward * (cur.mult || 1);
                        const updates = { balance: (cur.balance || 0) + bonus };
                        
                        if(type === 'main') {
                            updates.adCount = (cur.adCount || 0) + 1;
                        } else if(type === 'signup') {
                            updates.lastSignup = new Date().toDateString();
                        }
                        
                        db.ref('users/' + userId).update(updates).then(() => {
                            // বাটন রিসেট (যাতে আবার ক্লিক করা যায়)
                            btn.disabled = false;
                            btn.classList.remove('btn-locked');
                            btn.innerText = originalText;
                            
                            tg.showAlert(`Congrats! $${bonus.toFixed(3)} added.`);
                            
                            // সাইনআপ টাস্ক হলে সাথে সাথে হাইড করে দিবে
                            if(type === 'signup') document.getElementById('signup-container').classList.add('hidden-task');
                        });
                    });
                }
            }, 1000);
        }

        // ... Other functions (toggleTaskType, withdraw, refer) ...
        function toggleTaskType(type) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const links = type === 'smart' ? Array(15).fill("https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac") : Array(10).fill("https://google.com");
            const reward = type === 'smart' ? 0.05 : 0.10;
            const time = type === 'smart' ? 30 : 60;

            links.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = "glass p-4 flex justify-between items-center";
                div.innerHTML = `<div><p class="text-[10px] font-bold">Task #${i+1}</p></div>
                <button onclick="tg.openLink('${l}'); startVerification(this, ${reward}, ${time}, 'task')" class="bg-blue-600 text-[10px] px-4 py-2 rounded-lg font-bold">START</button>`;
                list.appendChild(div);
            });
        }

        function submitWithdraw() {
            const amt = parseFloat(document.getElementById('w-amount').value);
            if(amt > 0 && amt <= uData.balance) {
                db.ref('withdraw_requests').push({ userId, amt, addr: document.getElementById('w-addr').value });
                db.ref('users/' + userId).update({ balance: uData.balance - amt });
                tg.showAlert("Success!");
            }
        }
        function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-url').innerText); tg.showAlert("Copied!"); }
        
        toggleTaskType('smart');
    </script>
</body>
</html>
