<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; }
        .balance-card { background: linear-gradient(135deg, #37b0ff 0%, #0076ff 100%); border-radius: 25px; }
        .stats-card { background-color: #1c1c1e; border-radius: 20px; border: 1px solid #2c2c2e; }
        .btn-blue { background-color: #007aff; border-radius: 15px; color: #fff; width: 100%; padding: 16px; font-weight: bold; }
        .btn-blue:disabled { background-color: #2c2c2e; color: #666; }
        .locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex items-center mb-6 mt-2">
        <div id="user-photo" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold shadow-lg">?</div>
        <div>
            <h1 class="text-md font-bold">Hello, <span id="u-name">User</span></h1>
            <p class="text-[10px] text-green-400 font-bold uppercase tracking-tighter">Verified Meta Earner</p>
        </div>
    </div>

    <div class="balance-card p-10 text-center mb-6 shadow-xl shadow-blue-900/20">
        <p class="text-xs opacity-80 uppercase font-black">Current Balance</p>
        <h2 id="balance-text" class="text-5xl font-black mt-2 tracking-tighter">$0.000</h2>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div id="daily-card" onclick="dailyBonus()" class="stats-card p-5 text-center cursor-pointer">
            <i class="fas fa-gift text-3xl text-pink-500 mb-2"></i>
            <p class="text-[11px] font-bold uppercase">Daily Bonus</p>
        </div>
        <div id="spin-card" onclick="runSpin()" class="stats-card p-5 text-center cursor-pointer">
            <i id="spin-icon" class="fas fa-dharmachakra text-3xl text-blue-400 mb-2"></i>
            <p id="spin-label" class="text-[11px] font-bold uppercase">Lucky Spin</p>
        </div>
    </div>

    <div class="stats-card p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-blue-400 text-xs tracking-widest uppercase">Video Task</h3>
            <span id="ad-status" class="text-[9px] bg-blue-900/50 text-blue-300 px-2 py-1 rounded border border-blue-800">READY</span>
        </div>
        <button id="ad-btn" onclick="startAdTask()" class="btn-blue">Watch Ad (30s) - $0.01</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "test_user";
        const fullName = user ? (user.first_name + " " + (user.last_name || "")) : "Guest User";

        document.getElementById('u-name').innerText = fullName;
        document.getElementById('user-photo').innerText = fullName.charAt(0);

        let currentBalance = 0;
        let lastBonusDate = 0;
        let lastSpinDate = 0;

        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentBalance = data.balance || 0;
                lastBonusDate = data.lastBonus || 0;
                lastSpinDate = data.lastSpin || 0;
                document.getElementById('balance-text').innerText = "$" + currentBalance.toFixed(3);
                checkSpinStatus();
            } else {
                db.ref('users/' + userId).set({ name: fullName, balance: 0, lastBonus: 0, lastSpin: 0 });
            }
        });

        // ১. টেলিগ্রামের ভেতরেই অ্যাড ওপেন লজিক
        function startAdTask() {
            const btn = document.getElementById('ad-btn');
            const status = document.getElementById('ad-status');
            
            // সরাসরি টেলিগ্রাম বটের ভেতরের ব্রাউজারে ওপেন
            tg.openLink("https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac", {try_instant_view: true});
            
            btn.disabled = true;
            status.innerText = "WATCHING...";

            let timeLeft = 30;
            const timer = setInterval(() => {
                btn.innerText = `Wait ${timeLeft}s to get reward`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).update({ balance: currentBalance + 0.010 });
                    btn.innerText = "Watch Ad (30s) - $0.01";
                    btn.disabled = false;
                    status.innerText = "SUCCESS";
                    tg.showAlert("Success! $0.01 added.");
                }
            }, 1000);
        }

        // ২. স্পিন স্ট্যাটাস চেক (প্রতিদিন ১ বার)
        function checkSpinStatus() {
            const now = new Date().getTime();
            const spinCard = document.getElementById('spin-card');
            const spinLabel = document.getElementById('spin-label');
            
            if (now - lastSpinDate < 86400000) {
                spinCard.classList.add('locked');
                spinLabel.innerText = "Unlocked Tomorrow";
            } else {
                spinCard.classList.remove('locked');
                spinLabel.innerText = "Lucky Spin";
            }
        }

        function runSpin() {
            const now = new Date().getTime();
            if (now - lastSpinDate < 86400000) return;

            const icon = document.getElementById('spin-icon');
            icon.classList.add('fa-spin');

            const winAmount = (Math.random() * (0.005 - 0.001) + 0.001);

            setTimeout(() => {
                db.ref('users/' + userId).update({ 
                    balance: currentBalance + winAmount,
                    lastSpin: now 
                });
                icon.classList.remove('fa-spin');
                tg.showAlert(`Congrats! You won $${winAmount.toFixed(3)}`);
            }, 3000);
        }

        function dailyBonus() {
            const now = new Date().getTime();
            if (now - lastBonusDate < 86400000) return tg.showAlert("Already claimed today!");
            db.ref('users/' + userId).update({ balance: currentBalance + 0.005, lastBonus: now });
            tg.showAlert("Daily Bonus Added!");
        }
    </script>
</body>
</html>
