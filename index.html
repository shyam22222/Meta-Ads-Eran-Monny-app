<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .balance-card { background: linear-gradient(135deg, #37b0ff 0%, #0076ff 100%); border-radius: 25px; }
        
        /* Wheel Container */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 0 auto; }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #333; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            background: conic-gradient(
                #ff3e3e 0deg 45deg, #ff9e3e 45deg 90deg, #ffeb3e 90deg 135deg, #3eff3e 135deg 180deg,
                #3eebff 180deg 225deg, #3e3eff 225deg 270deg, #9e3eff 270deg 315deg, #ff3ecb 315deg 360deg
            ); 
            position: relative; overflow: hidden;
        }
        
        .segment-label {
            position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: black;
        }
        .label1 { transform: rotate(22deg); } .label2 { transform: rotate(67deg); }
        .label3 { transform: rotate(112deg); } .label4 { transform: rotate(157deg); }
        .label5 { transform: rotate(202deg); } .label6 { transform: rotate(247deg); }
        .label7 { transform: rotate(292deg); } .label8 { transform: rotate(337deg); }

        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: white; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #fff; border-radius: 50%; z-index: 15; }
        .locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        
        /* Iframe for Ad - এটাই টেলিগ্রামের ভেতরে অ্যাড রাখতে সাহায্য করবে */
        #ad-frame { width: 100%; height: 1px; border: none; visibility: hidden; position: absolute; }
    </style>
</head>
<body class="p-4 pb-24 text-center">

    <div class="flex items-center text-left mb-6">
        <div id="user-photo" class="w-10 h-10 bg-blue-600 rounded-full mr-3 flex items-center justify-center font-bold">?</div>
        <h1 class="font-bold">Hello, <span id="u-name">User</span></h1>
    </div>

    <div class="balance-card p-8 mb-8">
        <p class="text-xs font-bold opacity-80 uppercase">Wallet Balance</p>
        <h2 id="balance-text" class="text-4xl font-black mt-1">$0.000</h2>
    </div>

    <div class="mb-10">
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel-center"></div>
            <div id="wheel">
                <div class="segment-label label1"><b>$10</b></div>
                <div class="segment-label label2"><b>$5</b></div>
                <div class="segment-label label3"><b>$2</b></div>
                <div class="segment-label label4"><b>$1</b></div>
                <div class="segment-label label5"><b>50¢</b></div>
                <div class="segment-label label6"><b>30¢</b></div>
                <div class="segment-label label7"><b>10¢</b></div>
                <div class="segment-label label8"><b>05¢</b></div>
            </div>
        </div>
        <button id="spin-btn" onclick="startSpin()" class="bg-blue-600 px-10 py-3 rounded-full font-bold mt-8">SPIN NOW</button>
    </div>

    <div class="bg-[#1c1c1e] p-6 rounded-2xl border border-gray-800 text-left">
        <h3 class="text-blue-400 font-bold text-xs mb-4 uppercase">Earning Task</h3>
        <button id="ad-btn" onclick="startAdTask()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Watch Ad (30s) - $0.05</button>
        <iframe id="ad-frame"></iframe>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAjZXYVbwkdVHKK_KJeaWDKKkgankWuibU",
            databaseURL: "https://meta-ads-monny-bot-default-rtdb.firebaseio.com/",
            projectId: "meta-ads-monny-bot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "test_user";
        const fullName = user ? (user.first_name + " " + (user.last_name || "")) : "Guest";

        document.getElementById('u-name').innerText = fullName;
        document.getElementById('user-photo').innerText = fullName.charAt(0);

        let currentBalance = 0;
        let lastSpinDate = 0;
        let isSpinning = false;

        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentBalance = data.balance || 0;
                lastSpinDate = data.lastSpin || 0;
                document.getElementById('balance-text').innerText = "$" + currentBalance.toFixed(3);
                checkLock();
            } else {
                db.ref('users/' + userId).set({ name: fullName, balance: 0, lastSpin: 0 });
            }
        });

        function checkLock() {
            const now = new Date().getTime();
            if (now - lastSpinDate < 86400000) {
                const btn = document.getElementById('spin-btn');
                btn.classList.add('locked');
                btn.innerText = "Locked";
            }
        }

        // স্পিন লজিক
        function startSpin() {
            if (isSpinning) return;
            const now = new Date().getTime();
            if (now - lastSpinDate < 86400000) return;

            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const rotation = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                db.ref('users/' + userId).update({ balance: currentBalance + 0.01, lastSpin: now });
                tg.showAlert("You won $0.01!");
            }, 4100);
        }

        // ১. অ্যাড টাস্ক লজিক (ইন-অ্যাপ ফোকাসড)
        function startAdTask() {
            const btn = document.getElementById('ad-btn');
            const frame = document.getElementById('ad-frame');
            const adLink = "https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac";

            // প্রথমে টেলিগ্রাম ইন-অ্যাপ ব্রাউজার ট্রাই করা
            tg.openLink(adLink, {try_instant_view: true});
            
            // ব্যাকগ্রাউন্ডে অ্যাড লোড রাখা (যাতে টেলিগ্রামের ভেতরেই প্রসেস হয়)
            frame.src = adLink;
            
            btn.disabled = true;
            let time = 30;
            const timer = setInterval(() => {
                btn.innerText = `অপেক্ষা করুন: ${time}s`;
                time--;
                if (time < 0) {
                    clearInterval(timer);
                    db.ref('users/' + userId).update({ balance: currentBalance + 0.05 });
                    btn.innerText = "Watch Ad (30s) - $0.05";
                    btn.disabled = false;
                    tg.showPopup({
                        title: 'Success!',
                        message: 'আপনি $0.05 রিওয়ার্ড পেয়েছেন।',
                        buttons: [{type: 'ok'}]
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
