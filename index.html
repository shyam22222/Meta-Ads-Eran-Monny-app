<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 3.200;
    let adsCount = 10;

    // আপনার দেওয়া বিজ্ঞাপন লিঙ্কগুলো
    const adLinks = [
        "https://www.effectivegatecpm.com/san2vs080?key=06546f718cb8c7f01528f4bbb0d3adac", // Adsterra
        "https://omg10.com/4/10199976" // Monetag
    ];

    function startTask() {
        if(adsCount >= 15) {
            tg.showAlert("আজকের লিমিট শেষ! আগামীকাল আবার আসুন।");
            return;
        }

        let btn = document.getElementById('ad-btn');
        let timeLeft = 30; // ১০০% নিশ্চিত ৩০ সেকেন্ড টাইমার
        btn.disabled = true;
        btn.style.opacity = "0.6";

        let timer = setInterval(() => {
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Ad Loading in ${timeLeft}s...`;
            timeLeft--;

            if(timeLeft < 0) {
                clearInterval(timer);
                btn.innerHTML = `<i class="fas fa-play-circle mr-2"></i> Watch Ad (Earn $0.01)`;
                btn.disabled = false;
                btn.style.opacity = "1";
                
                // ৩০ সেকেন্ড শেষ হওয়ার পর অ্যাড ওপেন হবে
                let currentAd = adLinks[adsCount % 2];
                tg.openLink(currentAd);

                // ব্যালেন্স আপডেট (১ সেন্ট)
                balance += 0.01;
                adsCount += 1;
                document.getElementById('balance-text').innerText = "$" + balance.toFixed(3);
                document.getElementById('ads-count').innerText = adsCount;
                
                tg.showAlert("Success! $0.01 যোগ করা হয়েছে।");
            }
        }, 1000);
    }

    // ইনভাইট ফাংশন (এটি বটের ইনভাইট লিঙ্ক শেয়ার করবে)
    function inviteFriend() {
        let userId = tg.initDataUnsafe.user.id;
        let botUsername = "আপনার_বটের_ইউজারনেম"; // এখানে @ ছাড়া বটের ইউজারনেম দিন
        let inviteLink = `https://t.me/${botUsername}?start=${userId}`;
        let shareText = "এই অ্যাপে বিজ্ঞাপন দেখে প্রতিদিন টাকা আয় করুন। জয়েন করলেই বোনাস!";
        
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=${encodeURIComponent(shareText)}`);
    }
</script>
