<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .balance-card { background: linear-gradient(135deg, #22c1ff, #007bff); border-radius: 20px; }
        .stats-card { background-color: #1a1a1a; border-radius: 15px; border: 1px solid #333; }
        .task-btn { background-color: #007bff; border-radius: 12px; }
        .nav-icon { color: #888; font-size: 12px; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center mb-6">
        <img src="https://via.placeholder.com/40" class="rounded-full mr-3">
        <h1 class="text-xl font-bold">Welcome, User!</h1>
    </div>

    <div class="balance-card p-8 text-center mb-6 shadow-lg">
        <p class="text-sm opacity-90">Your Balance</p>
        <h2 class="text-4xl font-bold mt-2">$0.300</h2>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
        <div class="stats-card p-3 text-center">
            <i class="fas fa-ad text-blue-400 mb-1"></i>
            <p class="text-lg font-bold">6</p>
            <p class="text-[10px] text-gray-400">ADS WATCHED</p>
        </div>
        <div class="stats-card p-3 text-center">
            <i class="fas fa-calendar-alt text-blue-400 mb-1"></i>
            <p class="text-lg font-bold">6 / 15</p>
            <p class="text-[10px] text-gray-400">TODAY'S ADS</p>
        </div>
        <div class="stats-card p-3 text-center">
            <i class="fas fa-users text-blue-400 mb-1"></i>
            <p class="text-lg font-bold">0</p>
            <p class="text-[10px] text-gray-400">REFERRALS</p>
        </div>
    </div>

    <div class="mb-20">
        <h3 class="text-lg font-semibold mb-4">Today's Task</h3>
        <button class="w-full task-btn py-4 flex items-center justify-center mb-3 font-bold">
            <i class="fas fa-play mr-2"></i> Watch Ad
        </button>
        <button class="w-full bg-transparent border border-blue-500 py-4 flex items-center justify-center rounded-xl font-bold text-blue-400">
            <i class="fab fa-telegram mr-2"></i> Join Channel
        </button>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#111] border-t border-[#222] p-3 flex justify-around">
        <div class="text-center nav-icon"><i class="fas fa-wallet block text-lg"></i>Withdraw</div>
        <div class="text-center nav-icon"><i class="fas fa-history block text-lg"></i>History</div>
        <div class="text-center nav-icon text-white"><i class="fas fa-user-plus block text-lg"></i>Invite</div>
        <div class="text-center nav-icon"><i class="fas fa-tasks block text-lg"></i>Web Task</div>
        <div class="text-center nav-icon"><i class="fas fa-star block text-lg"></i>Daily Task</div>
    </div>
</body>
</html>
